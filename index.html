<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#0f172a">
    <title>Instituto Pro - Smart Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Google OAuth -->
    <meta name="google-signin-client_id" content="462599480572-6cnminb9tv7se0qovc14hn2ljbufqf0h.apps.googleusercontent.com">
    <script src="https://apis.google.com/js/platform.js" async defer></script>
    <script>
        document.write('<link rel="stylesheet" href="styles.css?v=' + new Date().getTime() + '">');
    </script>
</head>
<body>
    <div class="app-wrapper">
        <header class="main-header">
            <div class="logo">
                <i class="ri-calendar-check-fill"></i>
                <h1>INSTITUTO<span>PRO</span></h1>
            </div>
            <div id="auth-container" style="display: flex; align-items: center; gap: 10px;">
                <div class="g-signin2" data-onsuccess="onSignIn"></div>
                <button id="signout-btn" style="display:none; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); color: white; cursor: pointer;" onclick="signOut()">
                    <i class="ri-logout-box-r-line"></i> Salir
                </button>
            </div>
            <div class="tab-nav" id="main-nav" style="display:none;">
                <button class="tab-btn active" onclick="switchTab('cursos')">
                    <i class="ri-time-line"></i>
                    <span>Calendario</span>
                </button>
                <button class="tab-btn" onclick="switchTab('alumnos')">
                    <i class="ri-user-follow-line"></i>
                    <span>Inscripción</span>
                </button>
            </div>
        </header>

        <div class="content-area" id="app-content" style="display:none;">
            <main id="tab-cursos" class="tab-content active">
                <section class="mobile-card-form">
                    <div class="card">
                        <h2><i class="ri-add-box-line"></i> Programar Nuevo Curso</h2>
                        <form id="cursoForm">
                            <div class="input-group">
                                <label>Nombre del Curso</label>
                                <input type="text" id="c_nombre" required placeholder="Ej. Barbería Profesional">
                            </div>
                            <div class="input-group">
                                <label>Profesor</label>
                                <input type="text" id="c_profesor" required placeholder="Nombre del docente">
                            </div>
                            
                            <div class="input-row">
                                <div class="input-group">
                                    <label>Modalidad</label>
                                    <select id="c_modalidad">
                                        <option value="Presencial">Presencial (Ocupa Local)</option>
                                        <option value="Virtual">Virtual (Sin cruce)</option>
                                    </select>
                                </div>
                                <div class="input-group">
                                    <label>Duración</label>
                                    <select id="c_duracion">
                                        <option value="1">1 Hora</option>
                                        <option value="1.5">1.5 Horas</option>
                                        <option value="2">2 Horas</option>
                                        <option value="2.5">2.5 Horas</option>
                                        <option value="3">3 Horas</option>
                                        <option value="4">4 Horas</option>
                                    </select>
                                </div>
                            </div>

                            <div class="input-group">
                                <label>Días Disponibles</label>
                                <div class="dias-selector">
                                    <label><input type="checkbox" value="Lun" class="c_dias"><span>L</span></label>
                                    <label><input type="checkbox" value="Mar" class="c_dias"><span>M</span></label>
                                    <label><input type="checkbox" value="Mie" class="c_dias"><span>X</span></label>
                                    <label><input type="checkbox" value="Jue" class="c_dias"><span>J</span></label>
                                    <label><input type="checkbox" value="Vie" class="c_dias"><span>V</span></label>
                                    <label><input type="checkbox" value="Sab" class="c_dias"><span>S</span></label>
                                </div>
                            </div>

                            <div class="input-group">
                                <label>Hora de Inicio (08:00 - 21:00)</label>
                                <select id="c_horaInicio" required>
                                    <!-- Generado por JS: de 30 en 30 mins -->
                                </select>
                            </div>

                            <div id="availability-badge" class="status-msg">
                                Selecciona horario para verificar disponibilidad...
                            </div>

                            <button type="submit" class="btn-primary main-btn">
                                <i class="ri-calendar-event-line"></i> Confirmar y Reservar
                            </button>
                        </form>
                    </div>
                </section>

                <section class="mobile-list">
                    <h2 class="section-subtitle">Horarios Ocupados</h2>
                    <div id="cursosContainer" class="cursos-stack"></div>
                </section>
            </main>

            <main id="tab-alumnos" class="tab-content">
                <!-- Mantengo la estructura de alumnos previa -->
                <section class="mobile-card-form">
                    <div class="card">
                        <h2><i class="ri-user-add-line"></i> Inscribir Alumno</h2>
                        <form id="alumnoForm">
                            <div class="input-group">
                                <label>Nombre Completo</label>
                                <input type="text" id="a_nombre" required>
                            </div>
                            <div class="input-row">
                                <div class="input-group">
                                    <label>DNI</label>
                                    <input type="number" id="a_dni" required inputmode="numeric">
                                </div>
                                <div class="input-group">
                                    <label>Cuota</label>
                                    <select id="a_cuota">
                                        <option value="aldia">Al Día</option>
                                        <option value="debe">Debe</option>
                                    </select>
                                </div>
                            </div>
                            <div class="input-group">
                                <label>Curso / Horario</label>
                                <select id="a_claseId" required></select>
                            </div>
                            <button type="submit" class="btn-primary main-btn">
                                <i class="ri-user-star-line"></i> Finalizar Inscripción
                            </button>
                        </form>
                    </div>
                </section>

                <section class="mobile-list">
                    <div class="list-header-mobile">
                        <h2>Listado de Alumnos</h2>
                        <div class="mobile-filters">
                            <button class="chip-filter" onclick="renderAlumnos('todos')">Todos</button>
                            <button class="chip-filter deudores" onclick="renderAlumnos('deudores')">Deudores</button>
                        </div>
                    </div>
                    <div class="table-scroll-wrapper">
                        <table class="mobile-table">
                            <thead>
                                <tr>
                                    <th>Alumno</th>
                                    <th>Asist.</th>
                                    <th>Cuota</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="alumnosTable"></tbody>
                        </table>
                    </div>
                </section>
            </main>
        </div>
    </div>
    <script>
        document.write('<script src="script.js?v=' + new Date().getTime() + '"><\/script>');
    </script>
</body>
</html>
